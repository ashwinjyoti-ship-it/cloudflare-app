name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: apps/api
        run: |
          npm install
          npx tsc --noEmit

  check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: apps/web
        run: |
          npm install
          npm run build
